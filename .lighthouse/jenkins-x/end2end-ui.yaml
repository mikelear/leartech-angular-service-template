apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  creationTimestamp: null
  name: end2end-ui
spec:
  pipelineSpec:
    tasks:
    - name: end2end-ui
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/leartech-pipeline-catalog/tasks/end2end-ui/pullrequest.yaml@main
          name: ""
          env:
          - name: GIT_TOKEN
            valueFrom:
              secretKeyRef:
                name: tekton-git
                key: password
                optional: true
          # leartech-nginx serves /health not /health/live
          - name: END2END_HEALTH_PATH
            value: /health
          resources: {}
          workingDir: /workspace/source
        steps:
        - name: ""
          resources: {}
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 30m0s
status: {}
